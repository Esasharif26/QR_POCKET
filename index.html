<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL to QR Code</title>
    <meta name="theme-color" content="#d6602d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="QR Pocket" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon-192.png" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <div class="intro">
          <p class="eyebrow">Quick Generator</p>
          <h1>Turn any URL into a QR code.</h1>
          <p class="subcopy">
            Paste a link, generate a crisp QR code offline, and save or share it on any device.
          </p>
        </div>

        <form class="generator-form" id="qr-form">
          <label class="field-label" for="url-input">Website URL</label>
          <div class="input-row">
            <input
              id="url-input"
              name="url"
              type="url"
              placeholder="https://example.com"
              autocomplete="url"
              spellcheck="false"
              required
            />
            <button type="submit" class="primary-btn">Generate</button>
          </div>
          <label class="field-label secondary-label" for="filename-input">
            Download file name
          </label>
          <input
            id="filename-input"
            name="filename"
            type="text"
            placeholder="my-qr-code"
            autocomplete="off"
            spellcheck="false"
          />
          <p class="helper-text" id="status-text">
            Enter a full URL including <code>https://</code>.
          </p>
        </form>

        <section class="result-panel" aria-live="polite">
          <div class="qr-frame">
            <img
              id="qr-image"
              src="assets/qr-placeholder.svg"
              alt="Generated QR code preview"
              width="320"
              height="320"
            />
            <canvas id="qr-canvas" width="320" height="320"></canvas>
          </div>
          <div class="result-meta">
            <p class="result-label">Ready to scan</p>
            <p class="result-url" id="result-url">https://example.com</p>
            <div class="action-row">
              <button type="button" class="secondary-btn" id="download-btn">
                Download PNG
              </button>
              <button type="button" class="ghost-btn" id="share-btn">
                Share
              </button>
              <button type="button" class="ghost-btn" id="install-btn" hidden>
                Install app
              </button>
            </div>
          </div>
        </section>

        <section class="history-panel">
          <div class="history-header">
            <div>
              <p class="result-label">History</p>
              <p class="history-subcopy">Your recent generated QR links</p>
            </div>
            <button type="button" class="ghost-btn" id="clear-history-btn">
              Clear
            </button>
          </div>
          <ul class="history-list" id="history-list"></ul>
        </section>
      </section>
    </main>

    <script src="qr-lib.js"></script>
    <script src="script.js"></script>
  </body>
</html>
